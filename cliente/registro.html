<div id="fmRegistro">
    <form>
        <div class="form-group">
            <label for="apellidos">Apellidos:</label>
            <input type="text" class="form-control" id="apellidos" placeholder="Introduce apellidos">
        </div>
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" class="form-control" id="nombre" placeholder="Introduce nombre">
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" class="form-control" id="email" placeholder="Introduce email">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" class="form-control" id="password" placeholder="Introduce password">
        </div>
        <div id="errorRegistro" class="alert alert-danger mt-2" style="display:none;"></div>
        <button type="button" id="btnRegistro" class="btn btn-primary">Registrarse</button>
        <button type="button" id="btnIrLogin" class="btn btn-link">¿Ya tienes cuenta? Inicia sesión</button>
    </form>
</div>
